<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉄壁演習 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800 pt-6">

  <div id="app" class="w-full max-w-md"></div>

  <script>
    // --- 単語データベース（ここを増やせば200問でも対応可能） ---
    const WORD_LIST = [
      // Section 1
      { word: 'acquire', meaning: '〜を習得する、〜を獲得する', options: ['〜を習得する', '〜を捨てる', '〜を避ける', '〜を誇る'] },
      { word: 'attain', meaning: '〜を達成する、〜に到達する', options: ['〜を維持する', '〜を達成する', '〜を妨げる', '〜を疑う'] },
      { word: 'abandon', meaning: '〜を捨てる、〜をあきらめる', options: ['〜を育てる', '〜を認める', '〜を捨てる', '〜を隠す'] },
      { word: 'obtain', meaning: '〜を手に入れる', options: ['〜を手に入れる', '〜を失う', '〜を比較する', '〜を主張する'] },
      { word: 'fulfill', meaning: '〜を果たす、〜を満たす', options: ['〜を無視する', '〜を破壊する', '〜を延期する', '〜を果たす'] },
      { word: 'accomplish', meaning: '〜を成し遂げる', options: ['〜を成し遂げる', '〜を諦める', '〜を計画する', '〜を失敗する'] },
      { word: 'achieve', meaning: '〜を達成する', options: ['〜を邪魔する', '〜を達成する', '〜を後回しにする', '〜を忘れる'] },
      // Section 2
      { word: 'deprive', meaning: '〜から奪う', options: ['〜から奪う', '〜に与える', '〜を許す', '〜を救う'] },
      { word: 'rob', meaning: '〜から奪う、盗む', options: ['〜を貸す', '〜から奪う', '〜を祝う', '〜を避ける'] },
      { word: 'omit', meaning: '〜を除外する、抜かす', options: ['〜を加える', '〜を強調する', '〜を除外する', '〜を認める'] },
      { word: 'exclude', meaning: '〜を除外する', options: ['〜を含む', '〜を除外する', '〜を招待する', '〜を混ぜる'] },
      { word: 'reject', meaning: '〜を拒絶する', options: ['〜を拒絶する', '〜を受け入れる', '〜を称賛する', '〜を提案する'] },
      { word: 'refuse', meaning: '〜を断る', options: ['〜を断る', '〜を同意する', '〜を許す', '〜を頼む'] },
      { word: 'deny', meaning: '〜を否定する', options: ['〜を主張する', '〜を肯定する', '〜を否定する', '〜を白状する'] },
      // Section 3
      { word: 'retain', meaning: '〜を保持する、維持する', options: ['〜を放出する', '〜を保持する', '〜を忘れる', '〜を捨てる'] },
      { word: 'maintain', meaning: '〜を維持する、主張する', options: ['〜を維持する', '〜を放棄する', '〜を無視する', '〜を疑う'] },
      { word: 'preserve', meaning: '〜を保存する、保護する', options: ['〜を破壊する', '〜を汚染する', '〜を保存する', '〜を消費する'] },
      { word: 'sustain', meaning: '〜を支える、持続させる', options: ['〜を支える', '〜を崩壊させる', '〜を止める', '〜を拒む'] },
      { word: 'persist', meaning: '持続する、固執する', options: ['持続する', '諦める', '変化する', '移動する'] },
      // Section 4 & 5
      { word: 'alter', meaning: '〜を変える', options: ['〜を変える', '〜を維持する', '〜を固定する', '〜を模倣する'] },
      { word: 'modify', meaning: '〜を修正する', options: ['〜を強化する', '〜を修正する', '〜を放置する', '〜を破壊する'] },
      { word: 'attach', meaning: '〜を貼り付ける、添付する', options: ['〜を貼り付ける', '〜を切り離す', '〜を捨てる', '〜を運ぶ'] },
      { word: 'detach', meaning: '〜を切り離す', options: ['〜を貼り付ける', '〜を切り離す', '〜を混ぜる', '〜を隠す'] },
      { word: 'combine', meaning: '〜を結合させる', options: ['〜を結合させる', '〜を分離する', '〜を破壊する', '〜を拒否する'] },
      { word: 'separate', meaning: '〜を分離する', options: ['〜を分離する', '〜をつなぐ', '〜を招待する', '〜を好む'] }
    ];

    // --- 状態管理用変数 ---
    let quizSessionWords = []; // 今回の25問
    let currentIdx = 0;
    let score = 0;
    let isAnswering = false;

    // ローカルストレージ
    let bestScore = parseInt(localStorage.getItem('teppeki_best') || '0');
    let totalPlays = parseInt(localStorage.getItem('teppeki_plays') || '0');

    const appDiv = document.getElementById('app');

    // --- 関数：セッション開始 ---
    function startNewSession() {
      // 全単語をシャッフル
      const shuffledAll = [...WORD_LIST].sort(() => Math.random() - 0.5);
      // 先頭25問を取り出す
      quizSessionWords = shuffledAll.slice(0, Math.min(25, WORD_LIST.length));
      currentIdx = 0;
      score = 0;
      renderQuiz();
    }

    // --- 関数：クイズ描画 ---
    function renderQuiz() {
      const currentWord = quizSessionWords[currentIdx];
      const shuffledOptions = [...currentWord.options].sort(() => Math.random() - 0.5);

      appDiv.innerHTML = `
        <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 px-2 tracking-widest uppercase">
          <span>Random Exercise</span>
          <span>${currentIdx + 1} / ${quizSessionWords.length}</span>
        </div>
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-6 fade-in">
          <div class="h-44 flex flex-col items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-700 relative text-white">
            <div id="feedback-icon" class="absolute top-4 font-bold tracking-tighter opacity-80"></div>
            <h1 class="text-4xl font-black tracking-tight">${currentWord.word}</h1>
          </div>
        </div>
        <div class="grid gap-3 fade-in" style="animation-delay: 0.1s">
          ${shuffledOptions.map(opt => `
            <button onclick="handleAnswer('${opt.replace(/'/g, "\\'")}', this)" 
              class="w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white text-slate-700 font-semibold text-lg transition-all active:scale-95 hover:border-indigo-400">
              ${opt}
            </button>
          `).join('')}
        </div>
      `;
    }

    // --- 関数：回答処理 ---
    function handleAnswer(selected, btn) {
      if (isAnswering) return;
      isAnswering = true;

      const currentWord = quizSessionWords[currentIdx];
      const isCorrect = selected === currentWord.meaning;
      const feedbackIcon = document.getElementById('feedback-icon');

      if (isCorrect) {
        score++;
        btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
        feedbackIcon.innerText = "⭕️ CORRECT";
      } else {
        btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
        feedbackIcon.innerText = "❌ INCORRECT";
      }

      setTimeout(() => {
        currentIdx++;
        isAnswering = false;
        if (currentIdx < quizSessionWords.length) {
          renderQuiz();
        } else {
          renderResult();
        }
      }, 1000);
    }

    // --- 関数：結果表示 ---
    function renderResult() {
      const accuracy = Math.round((score / quizSessionWords.length) * 100);
      totalPlays++;
      if (accuracy > bestScore) {
        bestScore = accuracy;
        localStorage.setItem('teppeki_best', bestScore);
      }
      localStorage.setItem('teppeki_plays', totalPlays);

      appDiv.innerHTML = `
        <div class="bg-white p-8 rounded-3xl shadow-xl text-center fade-in">
          <h2 class="text-xl font-bold text-slate-500 mb-2 tracking-widest">RESULT</h2>
          <div class="text-7xl font-black text-indigo-600 mb-4">${accuracy}<span class="text-2xl">%</span></div>
          <p class="text-slate-500 font-medium mb-8">Score: ${score} / ${quizSessionWords.length}</p>
          
          <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-2xl text-left border border-slate-100">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1 tracking-tighter">Personal Best</p>
              <p class="text-xl font-black text-slate-700">${bestScore}%</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl text-left border border-slate-100">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1 tracking-tighter">Total Plays</p>
              <p class="text-xl font-black text-slate-700">${totalPlays}</p>
            </div>
          </div>

          <button onclick="startNewSession()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform hover:bg-slate-800">
            START NEXT SESSION
          </button>
        </div>
      `;
    }

    // アプリ起動
    startNewSession();
  </script>
</body>
</html>
