<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉄壁演習 2026 - Fixed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800 pt-6">

  <div id="app" class="w-full max-w-md"></div>

  <script>
    // --- 単語データベース ---
    // ルール：optionsの [0] 番目（最初）に必ず正解を書いてください。表示時は自動で混ざります。
    const WORD_LIST = [
      { word: 'acquire', options: ['〜を習得する、獲得する', '〜を捨てる', '〜を避ける', '〜を誇る'] },
      { word: 'attain', options: ['〜を達成する、到達する', '〜を維持する', '〜を妨げる', '〜を疑う'] },
      { word: 'abandon', options: ['〜を捨てる、あきらめる', '〜を育てる', '〜を認める', '〜を隠す'] },
      { word: 'obtain', options: ['〜を手に入れる', '〜を失う', '〜を比較する', '〜を主張する'] },
      { word: 'fulfill', options: ['〜を果たす、満たす', '〜を無視する', '〜を破壊する', '〜を延期する'] },
      { word: 'accomplish', options: ['〜を成し遂げる', '〜を諦める', '〜を計画する', '〜を失敗する'] },
      { word: 'achieve', options: ['〜を達成する', '〜を邪魔する', '〜を後回しにする', '〜を忘れる'] },
      { word: 'deprive', options: ['〜から奪う', '〜に与える', '〜を許す', '〜を救う'] },
      { word: 'rob', options: ['〜から奪う、盗む', '〜を貸す', '〜を祝う', '〜を避ける'] },
      { word: 'omit', options: ['〜を除外する、抜かす', '〜を加える', '〜を強調する', '〜を認める'] },
      { word: 'exclude', options: ['〜を除外する', '〜を含む', '〜を招待する', '〜を混ぜる'] },
      { word: 'reject', options: ['〜を拒絶する', '〜を受け入れる', '〜を称賛する', '〜を提案する'] },
      { word: 'refuse', options: ['〜を断る', '〜を同意する', '〜を許す', '〜を頼む'] },
      { word: 'deny', options: ['〜を否定する', '〜を主張する', '〜を肯定する', '〜を白状する'] },
      { word: 'retain', options: ['〜を保持する', '〜を放出する', '〜を忘れる', '〜を捨てる'] },
      { word: 'maintain', options: ['〜を維持する', '〜を放棄する', '〜を無視する', '〜を疑う'] },
      { word: 'preserve', options: ['〜を保存する', '〜を破壊する', '〜を汚染する', '〜を消費する'] },
      { word: 'sustain', options: ['〜を支える', '〜を崩壊させる', '〜を止める', '〜を拒む'] },
      { word: 'persist', options: ['持続する、固執する', '諦める', '変化する', '移動する'] },
      { word: 'alter', options: ['〜を変える', '〜を維持する', '〜を固定する', '〜を模倣する'] },
      { word: 'modify', options: ['〜を修正する', '〜を強化する', '〜を放置する', '〜を破壊する'] },
      { word: 'attach', options: ['〜を貼り付ける', '〜を切り離す', '〜を捨てる', '〜を運ぶ'] },
      { word: 'detach', options: ['〜を切り離す', '〜を貼り付ける', '〜を混ぜる', '〜を隠す'] },
      { word: 'combine', options: ['〜を結合させる', '〜を分離する', '〜を破壊する', '〜を拒否する'] },
      { word: 'separate', options: ['〜を分離する', '〜をつなぐ', '〜を招待する', '〜を好む'] }
    ];

    let quizSessionWords = [];
    let currentIdx = 0;
    let score = 0;
    let isAnswering = false;

    let bestScore = parseInt(localStorage.getItem('teppeki_best') || '0');
    let totalPlays = parseInt(localStorage.getItem('teppeki_plays') || '0');

    const appDiv = document.getElementById('app');

    function startNewSession() {
      const shuffledAll = [...WORD_LIST].sort(() => Math.random() - 0.5);
      quizSessionWords = shuffledAll.slice(0, Math.min(25, WORD_LIST.length));
      currentIdx = 0;
      score = 0;
      renderQuiz();
    }

    function renderQuiz() {
      const currentWord = quizSessionWords[currentIdx];
      // 正解を保存（options[0]が正解）
      const correctAnswer = currentWord.options[0];
      // 表示用にシャッフル
      const shuffledOptions = [...currentWord.options].sort(() => Math.random() - 0.5);

      appDiv.innerHTML = `
        <div class="flex justify-between text-xs font-bold text-slate-400 mb-2 px-2 tracking-widest uppercase">
          <span>Random Exercise</span>
          <span>${currentIdx + 1} / ${quizSessionWords.length}</span>
        </div>
        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden mb-6 fade-in">
          <div class="h-44 flex flex-col items-center justify-center bg-gradient-to-br from-indigo-600 to-blue-700 relative text-white">
            <div id="feedback-icon" class="absolute top-4 font-bold tracking-tighter opacity-80"></div>
            <h1 class="text-4xl font-black tracking-tight">${currentWord.word}</h1>
          </div>
        </div>
        <div class="grid gap-3 fade-in" style="animation-delay: 0.1s">
          ${shuffledOptions.map(opt => `
            <button onclick="handleAnswer('${opt.replace(/'/g, "\\'")}', '${correctAnswer.replace(/'/g, "\\'")}', this)" 
              class="w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white text-slate-700 font-semibold text-lg transition-all active:scale-95">
              ${opt}
            </button>
          `).join('')}
        </div>
      `;
    }

    function handleAnswer(selected, correct, btn) {
      if (isAnswering) return;
      isAnswering = true;

      const feedbackIcon = document.getElementById('feedback-icon');
      const isCorrect = selected === correct;

      if (isCorrect) {
        score++;
        btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
        feedbackIcon.innerText = "⭕️ CORRECT";
      } else {
        btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
        feedbackIcon.innerText = "❌ INCORRECT";
      }

      setTimeout(() => {
        currentIdx++;
        isAnswering = false;
        if (currentIdx < quizSessionWords.length) {
          renderQuiz();
        } else {
          renderResult();
        }
      }, 1000);
    }

    function renderResult() {
      const accuracy = Math.round((score / quizSessionWords.length) * 100);
      totalPlays++;
      if (accuracy > bestScore) {
        bestScore = accuracy;
        localStorage.setItem('teppeki_best', bestScore);
      }
      localStorage.setItem('teppeki_plays', totalPlays);

      appDiv.innerHTML = `
        <div class="bg-white p-8 rounded-3xl shadow-xl text-center fade-in">
          <h2 class="text-xl font-bold text-slate-500 mb-2 tracking-widest">RESULT</h2>
          <div class="text-7xl font-black text-indigo-600 mb-4">${accuracy}<span class="text-2xl">%</span></div>
          <p class="text-slate-500 font-medium mb-8">Score: ${score} / ${quizSessionWords.length}</p>
          
          <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-2xl text-left border border-slate-100">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1 tracking-tighter">Personal Best</p>
              <p class="text-xl font-black text-slate-700">${bestScore}%</p>
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl text-left border border-slate-100">
              <p class="text-xs text-slate-400 font-bold uppercase mb-1 tracking-tighter">Total Plays</p>
              <p class="text-xl font-black text-slate-700">${totalPlays}</p>
            </div>
          </div>

          <button onclick="startNewSession()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform hover:bg-slate-800">
            START NEXT SESSION
          </button>
        </div>
      `;
    }

    startNewSession();
  </script>
</body>
</html>
